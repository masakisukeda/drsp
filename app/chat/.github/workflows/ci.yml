name: chat-ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: chat-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP Syntax Check
        run: php -l api.php

      - name: Shell Syntax Check
        run: |
          bash -n start-local.sh
          bash -n lp/check-lp-regression.sh
