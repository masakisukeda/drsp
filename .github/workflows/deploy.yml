name: Deploy to drsp.cc

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-drsp-cc
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            root:
              - '.htaccess'
              - 'index.html'
              - 'styles.css'
              - 'main.js'
              - 'llms.txt'
              - 'sitemap.xml'
              - 'robots.txt'
              - 'favicon.webp'
              - 'favicon.png'
              - 'favicon.ico'
            about:
              - 'about/**'
            assets:
              - 'assets/**'
            eiri:
              - 'eiri/**'
            hieiri:
              - 'hieiri/**'
            inquiry:
              - 'inquiry/**'
            privacy:
              - 'privacy/**'
            member:
              - 'member/**'
            membership:
              - 'membership/**'
            any:
              - '.github/workflows/deploy.yml'
              - '.htaccess'
              - 'index.html'
              - 'styles.css'
              - 'main.js'
              - 'llms.txt'
              - 'sitemap.xml'
              - 'robots.txt'
              - 'favicon.webp'
              - 'favicon.png'
              - 'favicon.ico'
              - 'about/**'
              - 'assets/**'
              - 'eiri/**'
              - 'hieiri/**'
              - 'inquiry/**'
              - 'privacy/**'
              - 'member/**'
              - 'membership/**'

      - name: Update sitemap lastmod from git history
        if: steps.changes.outputs.any == 'true'
        run: |
          python3 <<'PY'
          from xml.etree import ElementTree as ET
          from datetime import datetime, timezone
          import subprocess
          from pathlib import Path

          ns = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          tree = ET.parse('sitemap.xml')
          root = tree.getroot()

          def page_file_from_loc(loc: str) -> str:
            if loc.endswith('/'):
              rel = loc.replace('https://drsp.cc', '').lstrip('/')
              if rel == '':
                return 'index.html'
              return f'{rel}index.html'
            rel = loc.replace('https://drsp.cc', '').lstrip('/')
            return rel

          today = datetime.now(timezone.utc).date().isoformat()

          for url in root.findall('sm:url', ns):
            loc = url.find('sm:loc', ns)
            lastmod = url.find('sm:lastmod', ns)
            if loc is None or lastmod is None:
              continue

            page_file = page_file_from_loc(loc.text.strip())
            if not Path(page_file).exists():
              lastmod.text = today
              continue

            try:
              out = subprocess.check_output(
                ['git', 'log', '-1', '--format=%cs', '--', page_file],
                text=True
              ).strip()
              lastmod.text = out if out else today
            except Exception:
              lastmod.text = today

          tree.write('sitemap.xml', encoding='UTF-8', xml_declaration=True)
          PY

      - name: Install lftp (if missing)
        if: steps.changes.outputs.any == 'true'
        run: |
          if command -v lftp >/dev/null 2>&1; then
            echo "lftp already installed"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Disable mentor.drsp.cc and enforce redirect
        if: steps.changes.outputs.any == 'true'
        env:
          FTP_HOST: ${{ secrets.DRSP_FTP_HOST }}
          FTP_USER: ${{ secrets.DRSP_FTP_USER }}
          FTP_PASS: ${{ secrets.DRSP_FTP_PASS }}
        run: |
          cat > /tmp/mentor.htaccess <<'EOF_HT'
          RewriteEngine On
          RewriteRule ^ https://drsp.cc/eiri/spot [R=301,L]
          EOF_HT

          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'EOF2'
          set ssl:verify-certificate no
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set net:max-retries 2
          set net:timeout 20
          cd /public_html/mentor.drsp.cc/
          rm -rf wp-admin wp-content wp-includes
          rm -f index.php wp-config.php wp-login.php wp-blog-header.php wp-comments-post.php wp-cron.php wp-links-opml.php wp-load.php wp-mail.php wp-settings.php wp-signup.php wp-trackback.php wp-activate.php xmlrpc.php readme.html license.txt feed
          put -O . -o .htaccess /tmp/mentor.htaccess
          bye
          EOF2

      - name: Remove WordPress Core Files
        if: steps.changes.outputs.root == 'true'
        env:
          FTP_HOST: ${{ secrets.DRSP_FTP_HOST }}
          FTP_USER: ${{ secrets.DRSP_FTP_USER }}
          FTP_PASS: ${{ secrets.DRSP_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'EOF2'
          set ssl:verify-certificate no
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set net:max-retries 2
          set net:timeout 20
          cd /public_html/drsp.cc/
          rm -f index.php wp-config.php wp-login.php wp-blog-header.php wp-comments-post.php wp-cron.php wp-links-opml.php wp-load.php wp-mail.php wp-settings.php wp-signup.php wp-trackback.php wp-activate.php xmlrpc.php readme.html license.txt
          bye
          EOF2

      - name: Upload Static Site Files
        if: steps.changes.outputs.any == 'true'
        env:
          FTP_HOST: ${{ secrets.DRSP_FTP_HOST }}
          FTP_USER: ${{ secrets.DRSP_FTP_USER }}
          FTP_PASS: ${{ secrets.DRSP_FTP_PASS }}
          CH_ROOT: ${{ steps.changes.outputs.root }}
          CH_ABOUT: ${{ steps.changes.outputs.about }}
          CH_ASSETS: ${{ steps.changes.outputs.assets }}
          CH_EIRI: ${{ steps.changes.outputs.eiri }}
          CH_HIEIRI: ${{ steps.changes.outputs.hieiri }}
          CH_INQUIRY: ${{ steps.changes.outputs.inquiry }}
          CH_PRIVACY: ${{ steps.changes.outputs.privacy }}
          CH_MEMBER: ${{ steps.changes.outputs.member }}
          CH_MEMBERSHIP: ${{ steps.changes.outputs.membership }}
        run: |
          {
            echo "set ssl:verify-certificate no"
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set net:max-retries 2"
            echo "set net:timeout 20"
            echo "cd /public_html/drsp.cc/"
            echo "lcd ."
            if [ "$CH_ROOT" = "true" ]; then
              echo "put -O . .htaccess"
              echo "put -O . index.html"
              echo "put -O . styles.css"
              echo "put -O . main.js"
              echo "put -O . llms.txt"
              echo "put -O . robots.txt"
            fi
            # favicon files are tiny and should stay in sync even when only workflow changes
            echo "put -O . favicon.webp"
            echo "put -O . favicon.png"
            echo "put -O . favicon.ico"
            # sitemap is regenerated in workflow; always upload when deploy runs
            echo "put -O . sitemap.xml"
            if [ "$CH_ABOUT" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms about about"
            fi
            if [ "$CH_ASSETS" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms assets assets"
            fi
            if [ "$CH_EIRI" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms eiri eiri"
            fi
            if [ "$CH_HIEIRI" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms hieiri hieiri"
            fi
            if [ "$CH_INQUIRY" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms inquiry inquiry"
            fi
            if [ "$CH_PRIVACY" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms privacy privacy"
            fi
            if [ "$CH_MEMBER" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms member member"
            fi
            if [ "$CH_MEMBERSHIP" = "true" ]; then
              echo "mirror -R --delete --verbose=1 --parallel=4 --only-newer --no-perms membership membership"
            fi
            echo "bye"
          } > /tmp/upload.lftp

          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" < /tmp/upload.lftp
