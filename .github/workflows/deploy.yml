name: Deploy to drsp.cc

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DRSP_FTP_HOST }}
          username: ${{ secrets.DRSP_FTP_USER }}
          password: ${{ secrets.DRSP_FTP_PASS }}
          server-dir: /virtual/sukeda/public_html/drsp.cc/
          exclude: |
            **/.git*
            **/.git*/**
            **/wp-source/**
            **/.DS_Store
            **/.claude/**
            app/**
            dic/**
            mng/**
            chat/**
