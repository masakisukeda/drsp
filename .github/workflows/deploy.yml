name: Deploy to drsp.cc

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://${{ secrets.DRSP_FTP_USER }}:${{ secrets.DRSP_FTP_PASS }}@${{ secrets.DRSP_FTP_HOST }};
            mirror -R \
              --exclude=^\.git \
              --exclude=^wp-source/ \
              --exclude=^\.DS_Store \
              --exclude=^\.claude/ \
              --exclude=^app/ \
              --exclude=^dic/ \
              --exclude=^mng/ \
              --exclude=^chat/ \
              . /virtual/sukeda/public_html/drsp.cc/
          "
