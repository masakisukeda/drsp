name: Deploy to drsp.cc

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Remove WordPress Core Files
        env:
          FTP_HOST: ${{ secrets.DRSP_FTP_HOST }}
          FTP_USER: ${{ secrets.DRSP_FTP_USER }}
          FTP_PASS: ${{ secrets.DRSP_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'EOF'
          set ssl:verify-certificate no
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set net:max-retries 2
          set net:timeout 20
          cd /public_html/drsp.cc/
          rm -f index.php .htaccess wp-config.php wp-login.php wp-blog-header.php wp-comments-post.php wp-cron.php wp-links-opml.php wp-load.php wp-mail.php wp-settings.php wp-signup.php wp-trackback.php wp-activate.php xmlrpc.php readme.html license.txt
          bye
          EOF

      - name: Upload Static Site Files
        env:
          FTP_HOST: ${{ secrets.DRSP_FTP_HOST }}
          FTP_USER: ${{ secrets.DRSP_FTP_USER }}
          FTP_PASS: ${{ secrets.DRSP_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'EOF'
          set ssl:verify-certificate no
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set net:max-retries 2
          set net:timeout 20
          cd /public_html/drsp.cc/
          lcd .

          put -O . index.html
          put -O . styles.css
          put -O . main.js
          put -O . llms.txt

          mirror -R --delete --verbose about about
          mirror -R --delete --verbose assets assets
          mirror -R --delete --verbose eiri eiri
          mirror -R --delete --verbose hieiri hieiri
          mirror -R --delete --verbose inquiry inquiry
          mirror -R --delete --verbose member member
          bye
          EOF
